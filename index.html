*{

body{

#game{

#main{

}

#title{

#text{

}

#choices{

    gap:25px;
    margin-top:20px;
}

.choice{

    border:none;
    color:#aaa;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
    font-family:inherit;
}

.choice:hover{
    color:white;
}

#side{
    width:320px;
    border-left:1px solid #222;
    padding:30px;
}

#text::-webkit-scrollbar{
    width:6px;
}

#text::-webkit-scrollbar-track{
    background:transparent;
}

#text::-webkit-scrollbar-thumb{
    background:#333;
    border-radius:20px;
}

#text::-webkit-scrollbar-thumb:hover{
    background:#666;
}

.panel-title{
    color:white;
    margin-bottom:15px;
    font-size:22px;
}

.side-buttons{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.side-btn{
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
    font-family:inherit;
    font-size:16px;
}

.side-btn:hover{
    color:white;
}

.fadeText{

    animation: fadeText 3s forwards;

}

@keyframes fadeText{

    from{
        opacity:1;
    }

    to{
        opacity:0.1;
    }

}
  
#panelContent{
    line-height:1.8;
    white-space:pre-wrap;
    color:#bbb;
}

#restartBtn{
    margin-top:30px;
    background:none;
    border:none;
    color:#888;
    cursor:pointer;
    font-family:inherit;
    font-size:16px;
}

@keyframes shake {

    0%   { transform: translate(0,0); }
    20%  { transform: translate(-2px,1px); }
    40%  { transform: translate(2px,-1px); }
    60%  { transform: translate(-2px,0); }
    80%  { transform: translate(2px,1px); }
    100% { transform: translate(0,0); }

}

.shake{
    animation: shake 0.15s infinite;
}

@keyframes shakeWeak {

    0% { transform: translate(0,0); }
    25% { transform: translate(-1px,1px); }
    50% { transform: translate(1px,-1px); }
    75% { transform: translate(-1px,0); }
    100% { transform: translate(0,0); }

}

@keyframes shakeMedium {

    0% { transform: translate(0,0); }
    25% { transform: translate(-3px,2px); }
    50% { transform: translate(3px,-2px); }
    75% { transform: translate(-2px,1px); }
    100% { transform: translate(0,0); }

}

@keyframes shakeStrong {

    0% { transform: translate(0,0); }
    25% { transform: translate(-6px,3px); }
    50% { transform: translate(6px,-3px); }
    75% { transform: translate(-4px,2px); }
    100% { transform: translate(0,0); }

}

.shakeWeak{
    animation: shakeWeak 1.2s infinite;
}

.shakeMedium{
    animation: shakeMedium 0.9s infinite;
}

.shakeStrong{
    animation: shakeStrong 0.6s infinite;
}
  
#restartBtn:hover{
    color:#fff;
}

let soundCounter = 0;

 function fadeTextOut(){

function playTypeSound(){

    soundCounter++;

    if(soundCounter % 4 !== 0) return;

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sawtooth";
    oscillator.frequency.value =
        50 + Math.random() * 20;

    gainNode.gain.value = 0.05;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();

    gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + 0.12
    );

    oscillator.stop(audioCtx.currentTime + 0.12);

}

let typingTimer = null;
let typingText = "";
let typingIndex = 0;
let typingFinished = true;

function typeWriter(text){

    if(typingTimer){
        clearInterval(typingTimer);
    }

    typingText = text;
    typingIndex = 0;
    typingFinished = false;

    textBox.innerHTML = "";

    typingTimer = setInterval(()=>{

        const char = typingText.charAt(typingIndex);

        textBox.innerHTML += char;
textBox.scrollTop = textBox.scrollHeight;

        if(
            char !== " " &&
            char !== "\n" &&
            char !== "，" &&
            char !== "。" &&
            char !== "、" &&
            char !== "：" &&
            char !== "；" &&
            char !== "！" &&
            char !== "？"
        ){
            playTypeSound();
        }

        typingIndex++;

        if(typingIndex >= typingText.length){

            clearInterval(typingTimer);

            typingFinished = true;
        }

    },40);

}

function showFadingLine(text,speed=80){

    return new Promise(resolve=>{

        textBox.innerHTML = "";
        textBox.style.opacity = "1";

        let i = 0;

        const timer = setInterval(()=>{

            textBox.innerHTML += text.charAt(i);

            const char = text.charAt(i);

            if(
                char !== " " &&
                char !== "\n" &&
                char !== "，" &&
                char !== "。" &&
                char !== "、" &&
                char !== "：" &&
                char !== "；" &&
                char !== "！" &&
                char !== "？"
            ){
                playTypeSound();
            }

            i++;

            if(i >= text.length){

                clearInterval(timer);

                // 停留 1.2 秒
                setTimeout(()=>{

                    textBox.style.transition =
                        "opacity 3.5s linear";

                    textBox.style.opacity = "0.1";

                    setTimeout(()=>{

                        textBox.style.transition = "";
                        textBox.style.opacity = "1";

                        resolve();

                    },3500);

                },1200);

            }

        },speed);

    });

}
  
function setShake(level){

    const game = document.getElementById("text");

    game.classList.remove(
        "shakeWeak",
        "shakeMedium",
        "shakeStrong"
    );

    if(level){
        game.classList.add(level);
    }

}

function shakeOnce(){

    const game =
        document.getElementById("game");

    game.classList.add("shake");

    setTimeout(()=>{

        game.classList.remove("shake");

    },300);

}

document.addEventListener("click",(e)=>{

    if(
        !typingFinished &&
        e.target.tagName !== "BUTTON"
    ){

        clearInterval(typingTimer);

        textBox.innerHTML = typingText;

        typingFinished = true;
    }

});
  
function move(scene){

    if(
        currentScene==="study" &&
        scene==="hall"
    ){

        hallLoopCount++;

    }

    else if(
        currentScene==="hall" &&
        scene==="study"
    ){

        hallLoopCount++;

    }

    else{

        hallLoopCount=0;

    }
    if(scene==="office"){

    if(
        !inventory.includes("打火機") &&
        !flags.officeBurned
    ){

        officeEnterCount++;

        if(officeEnterCount >= 3){

            flags.officeBurned = true;

            showOfficeFireEvent();

            return;
        }

    }

}
    currentScene=scene;

    if(
        hallLoopCount>=6 &&
        !flags.hallRopeEvent &&
        !flags.hallRopeCleared
    ){

        flags.hallRopeEvent=true;

        startRopeEvent();

        return;

    }

    renderScene();

}
function renderScene(){

    const scene=scenes[currentScene];

    typeWriter(scene.desc);

    choiceBox.innerHTML="";

    scene.choices.forEach(c=>{

        const btn=document.createElement("button");

        btn.className="choice";

        btn.innerText=c[0];

        btn.onclick=c[1];

        choiceBox.appendChild(btn);

    });

}

function createChoiceButtons(options){

    options.forEach(c=>{

        const btn=document.createElement("button");

        btn.className="choice";

        btn.innerText=c[0];

        btn.onclick=c[1];

        choiceBox.appendChild(btn);

    });

}  

function addMemo(text){

    if(!memos.includes(text))
        memos.push(text);

}

function addItem(item){

    if(!inventory.includes(item))
        inventory.push(item);

}

function obtainItem(item, foundText=""){

    addItem(item);

    let text = "";

    if(foundText){
        text += foundText + "\n\n";
    }

    text += "獲得物品：" + item;

    if(
        itemData[item] &&
        itemData[item].readable
    ){

        text += "\n\n要現在查看嗎？";

        typeWriter(text);

        choiceBox.innerHTML = "";

        const yes = document.createElement("button");
        yes.className = "choice";
        yes.innerText = "現在查看";

        yes.onclick = ()=>{

            showItem(item);

        };

        const no = document.createElement("button");
        no.className = "choice";
        no.innerText = "稍後查看";

        no.onclick = ()=>{

            renderScene();

        };

        choiceBox.appendChild(yes);
        choiceBox.appendChild(no);

    }else{

        typeWriter(text);

    }

}

function addLetterChoice(text,id,next){

    let btn=document.createElement("button");

    btn.className="choice";

    btn.innerText=text;

    btn.onclick=()=>{

        letterState+=id;

        next();

    };

    choiceBox.appendChild(btn);

}

function finishLetter(){

    let content = generateLetterContent();

    itemData["信紙"].content = content;

    obtainItem(
        "信紙",
        "你完成了一封信。"
    );

}

function generateLetterContent(){

    if(currentLetterCode){
        flags["letter_"+currentLetterCode] = false;
    }

    currentLetterCode = letterState;

    flags["letter_"+letterState] = true;


    const map={

        "1":"親愛的朋友",

        "2":"我一直想告訴你"

    };

    let text="";

    switch(letterState[0]){

        case "1":
            text+="親愛的朋友\n\n";
            break;

        case "2":
            text+="我一直想告訴你\n\n";
            break;
    }

    switch(letterState[1]){

        case "1":
            text+="謝謝你的陪伴。\n\n";
            break;

        case "2":
            text+="其實我很害怕。\n\n";
            break;
    }

    switch(letterState[2]){

        case "1":
            text+="希望還能再見。";
            break;

        case "2":
            text+="請不要忘記我。";
            break;
    }

    flags["letter_"+letterState]=true;

    return text;

}

    choiceBox.innerHTML="";

    let btn=document.createElement("button");

    btn.className="choice";

    btn.style.color="#aa4444";

    btn.innerText="繼續睡覺";

    btn.onclick=()=>{

        showSleepEnding();

    };

    choiceBox.appendChild(btn);

}
  
function showSleepEnding(){

    textBox.style.color="#ff4444";

    choiceBox.innerHTML="";

    typeWriter(
    "你被沙發吞噬，永遠的陷入安眠，再也無法感受到任何事物，僅僅是存在著而已。"
    );

    setTimeout(()=>{

        textBox.innerHTML +=
        "\n\n【結局：年輕真好，倒頭就睡】";

    },1000);

}

function ropeDeath(){

    showEnding(

        "晴天娃娃",

        "你停止了掙扎。\n\n" +
        "斷裂的繩索緩緩收緊。\n\n" +
        "黑暗吞沒了一切。"

    );

}

function officeFireDeath(){

    showEnding(

        "15年前",

        "你推開燃燒的門。\n\n" +
        "灼熱的火焰瞬間吞噬全身。\n\n" +
        "濃煙堵住呼吸。\n\n" +
        "你倒在火海之中。\n\n" +
        "辦公室裡的東西真的值得你付出生命嗎？"
    );

}

function showEnding(title,text){

    setShake(null);

    textBox.classList.remove("fadeText");
    textBox.style.opacity="1";

    textBox.style.color="#ff4444";

    choiceBox.innerHTML="";

    typeWriter(text);

    setTimeout(()=>{

        textBox.innerHTML +=
        "\n\n【結局："+title+"】";

    },2500);

}
  
function showInventory(){

    panelContent.innerHTML="";

    let header=document.createElement("div");

    header.innerText=
    `你盤點了身上的物品，總共有「${inventory.length}」項。`;

    panelContent.appendChild(header);

    if(inventory.length===0)
        return;

    let list=document.createElement("div");

    list.style.marginTop="15px";

    inventory.forEach(item=>{

        let btn=document.createElement("button");

        btn.className="side-btn";

        btn.innerText=item;

        btn.onclick=()=>showItem(item);

        list.appendChild(btn);

        list.appendChild(document.createElement("br"));

    });

    panelContent.appendChild(list);
}
function showItem(item){

    const data=itemData[item];

    let text=
    item +
    "\n\n" +
    data.description;

    panelContent.innerText=text;

    if(data.readable){

        let btn=document.createElement("button");

        btn.className="side-btn";

        btn.innerText="查看內容";

        btn.onclick=()=>readItem(item);

        panelContent.appendChild(
            document.createElement("br")
        );

        panelContent.appendChild(
            document.createElement("br")
        );

        panelContent.appendChild(btn);

    }

}
  function readItem(item){

    const data=itemData[item];

    panelContent.innerText=data.content;

    if(data.flag){

        flags[data.flag]=true;

    }

}


function showMemo(){

if(memos.length===0){

panelContent.innerText="目前沒有備忘錄。";

return;

}

let text="備忘錄：\n\n";

memos.forEach(m=>{

text+="• "+m+"\n\n";

});

panelContent.innerText=text;

}

function resetTextEffects(){

    textBox.classList.remove("fadeText");

    textBox.style.opacity="1";

    textBox.style.color="#ddd";

}
  
function restartGame(){

const ok=confirm("確定要重新開始嗎？");

if(!ok) return;

inventory=[];

memos=[];

explored={};

flags = structuredClone(defaultFlags);

letterState = "";
sleepCount = 0;

currentLetterCode = "";

lostFoundItem = null;

currentScene="study";

resetTextEffects();   // ←新增

setShake(null);

textBox.style.color="#ddd";

panelContent.innerText="歡迎來到圖書館。";

renderScene();

}

renderScene();

</script>
