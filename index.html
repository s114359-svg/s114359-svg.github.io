@keyframes shake {

    0%   { transform: translate(0,0); }
    20%  { transform: translate(-2px,1px); }
    40%  { transform: translate(2px,-1px); }
    60%  { transform: translate(-2px,0); }
    80%  { transform: translate(2px,1px); }
    100% { transform: translate(0,0); }

}

.shake{
    animation: shake 0.15s infinite;
}

@keyframes shakeWeak {

    0% { transform: translate(0,0); }
    25% { transform: translate(-1px,1px); }
    50% { transform: translate(1px,-1px); }
    75% { transform: translate(-1px,0); }
    100% { transform: translate(0,0); }

}

@keyframes shakeMedium {

    0% { transform: translate(0,0); }
    25% { transform: translate(-3px,2px); }
    50% { transform: translate(3px,-2px); }
    75% { transform: translate(-2px,1px); }
    100% { transform: translate(0,0); }

}

@keyframes shakeStrong {

    0% { transform: translate(0,0); }
    25% { transform: translate(-6px,3px); }
    50% { transform: translate(6px,-3px); }
    75% { transform: translate(-4px,2px); }
    100% { transform: translate(0,0); }

}

.shakeWeak{
    animation: shakeWeak 1.2s infinite;
}

.shakeMedium{
    animation: shakeMedium 0.9s infinite;
}

.shakeStrong{
    animation: shakeStrong 0.6s infinite;
}
  
#restartBtn:hover{

let soundCounter = 0;

 function fadeTextOut(){

function playTypeSound(){

    soundCounter++;

    if(soundCounter % 4 !== 0) return;

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sawtooth";
    oscillator.frequency.value =
        50 + Math.random() * 20;

    gainNode.gain.value = 0.05;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();

    gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + 0.12
    );

    oscillator.stop(audioCtx.currentTime + 0.12);

}

let typingTimer = null;
let typingText = "";
let typingIndex = 0;
let typingFinished = true;

function typeWriter(text){

    if(typingTimer){
        clearInterval(typingTimer);
    }

    typingText = text;
    typingIndex = 0;
    typingFinished = false;

    textBox.innerHTML = "";

    typingTimer = setInterval(()=>{

        const char = typingText.charAt(typingIndex);

        textBox.innerHTML += char;
textBox.scrollTop = textBox.scrollHeight;

        if(
            char !== " " &&
            char !== "\n" &&
            char !== "，" &&
            char !== "。" &&
            char !== "、" &&
            char !== "：" &&
            char !== "；" &&
            char !== "！" &&
            char !== "？"
        ){
            playTypeSound();
        }

        typingIndex++;

        if(typingIndex >= typingText.length){

            clearInterval(typingTimer);

            typingFinished = true;
        }

    },40);

}

function showFadingLine(text,speed=80){

    return new Promise(resolve=>{

        textBox.innerHTML = "";
        textBox.style.opacity = "1";

        let i = 0;

        const timer = setInterval(()=>{

            textBox.innerHTML += text.charAt(i);

            const char = text.charAt(i);

            if(
                char !== " " &&
                char !== "\n" &&
                char !== "，" &&
                char !== "。" &&
                char !== "、" &&
                char !== "：" &&
                char !== "；" &&
                char !== "！" &&
                char !== "？"
            ){
                playTypeSound();
            }

            i++;

            if(i >= text.length){

                clearInterval(timer);

                // 停留 1.2 秒
                setTimeout(()=>{

                    textBox.style.transition =
                        "opacity 3.5s linear";

                    textBox.style.opacity = "0.1";

                    setTimeout(()=>{

                        textBox.style.transition = "";
                        textBox.style.opacity = "1";

                        resolve();

                    },3500);

                },1200);

            }

        },speed);

    });

}

function move(scene){
if(flags.read_diary){
    if(
        currentScene==="study" &&
        scene==="hall"
    ){

        hallLoopCount++;

    }

    else if(
        currentScene==="hall" &&
        scene==="study"
    ){

        hallLoopCount++;

    }

    else{

        hallLoopCount=0;

    }

}
    if(scene==="office"){

    if(
        !inventory.includes("打火機") &&
        !flags.officeBurned
    ){

        officeEnterCount++;

        if(officeEnterCount >= 3){

            flags.officeBurned = true;

            showOfficeFireEvent();

            return;
        }

    }

}
    currentScene=scene;

    if(
    hallLoopCount>=6 &&
    flags.read_diary &&
    !flags.hallRopeEvent &&
    !flags.hallRopeCleared
){

        flags.hallRopeEvent=true;

        startRopeEvent();

        return;

    }

    renderScene();

}
function renderScene(){

    const scene=scenes[currentScene];

    typeWriter(scene.desc);

    choiceBox.innerHTML="";

    scene.choices.forEach(c=>{

        const btn=document.createElement("button");

        btn.className="choice";

        btn.innerText=c[0];

        btn.onclick=c[1];

        choiceBox.appendChild(btn);

    });

}

function createChoiceButtons(options){

    options.forEach(c=>{

    });

}

function takeLostFoundItem(){

    if(!lostFoundItem) return;

    const item = lostFoundItem;

    if(item==="借書證"){
        flags.borrowCardReturned = false;
    }

    inventory.push(item);

    lostFoundItem = null;

    typeWriter(
        "你從失物招領抽屜中取回了「" +
        item +
        "」。"
    );

    choiceBox.innerHTML="";

    createChoiceButtons([

        ["繼續查看抽屜",()=>showLostFoundMenu()],

        ["離開",()=>showCounterMenu()]

    ]);

}

function enterStair(){

    stairFloor = 1;

    showStairMenu();

}

function showStairMenu(){

    let floorName = "";

    switch(stairFloor){

        case 1:
            floorName = "一樓";
            break;

        case 2:
            floorName = "二樓";
            break;

        case 3:
            floorName = "三樓";
            break;

        case 4:
            floorName = "四樓";
            break;
    }

    typeWriter(
        "你站在樓梯間。\n\n" +
        "目前位於：" + floorName
    );

    choiceBox.innerHTML="";

    const options = [];

    // 進入本層

    if(stairFloor===2){

        options.push([
            "進入資料室",
            ()=>enterArchiveRoom()
        ]);

    }

    if(stairFloor===3){

        options.push([
            "進入校史室",
            ()=>enterHistoryRoom()
        ]);

    }

    if(stairFloor===4){

        options.push([
            "前往頂樓露台",
            ()=>enterRoof()
        ]);

    }

  

    // 上樓

    if(stairFloor < 4){

        options.push([
            "上樓",
            ()=>{
                stairFloor++;
                showStairMenu();
            }
        ]);

    }

    // 下樓

    if(stairFloor > 1){

        options.push([
            "下樓",
            ()=>{
                stairFloor--;
                showStairMenu();
            }
        ]);
    
    }

   if(stairFloor===1){

        options.push([
            "離開樓梯間",
            ()=>move("hall")
        ]);

    }

    createChoiceButtons(options);

}

function showInventory(){

    panelContent.innerHTML="";

    let header=document.createElement("div");

    header.innerText=
    `你盤點了身上的物品，總共有「${inventory.length}」項。`;

    panelContent.appendChild(header);

    if(inventory.length===0)
        return;

    let list=document.createElement("div");

    list.style.marginTop="15px";

    inventory.forEach(item=>{

        let btn=document.createElement("button");

        btn.className="side-btn";

        btn.innerText=item;

        btn.onclick=()=>showItem(item);

        list.appendChild(btn);

        list.appendChild(document.createElement("br"));

    });

    panelContent.appendChild(list);
}

function showItem(item){

    const data=itemData[item];

    let text=
    item +
    "\n\n" +
    data.description;

    panelContent.innerText=text;

    if(data.readable){

        let btn=document.createElement("button");

        btn.className="side-btn";

        if(item==="筆記本"){

    btn.innerText="閱讀筆記";

    btn.onclick=()=>{

        notebookPage=0;

        showNotebookPage();

    };


        }else{

            btn.innerText="查看內容";

            btn.onclick=()=>readItem(item);

        }

        panelContent.appendChild(
            document.createElement("br")
        );

        panelContent.appendChild(
            document.createElement("br")
        );

        panelContent.appendChild(btn);

    }

}
        
  function readItem(item){

    const data=itemData[item];

    panelContent.innerText=data.content;

    if(data.flag){

        flags[data.flag]=true;

    }

}


function showMemo(){

if(memos.length===0){

panelContent.innerText="目前沒有備忘錄。";

return;

}

let text="備忘錄：\n\n";

memos.forEach(m=>{

text+="• "+m+"\n\n";

});

panelContent.innerText=text;

if(gameFlags.graduateLetterDelivered &&
   !gameFlags.letterBurned){

    memos.push(
        "女孩已經離開。\n或許可以回自修室看看。"
    );

}

}

function resetTextEffects(){

    textBox.classList.remove("fadeText");

    textBox.style.opacity="1";

    textBox.style.color="#ddd";

}
  
function restartGame(){

const ok=confirm("確定要重新開始嗎？");

if(!ok) return;

inventory=[];

memos=[];

explored={};

flags = structuredClone(defaultFlags);

letterState = "";
sleepCount = 0;
hallLoopCount = 0;
let notebookPage = 0;
officeEnterCount=0;

officeDeathClicks=0;
borrowPage = 1;
currentLetterCode = "";

lostFoundItem = null;

currentScene="study";

resetTextEffects();   // ←新增

setShake(null);

textBox.style.color="#ddd";

panelContent.innerText="歡迎來到圖書館。";

renderScene();

}

renderScene();

</script>
