<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>放學後的圖書館</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#ddd;
    font-family:"Noto Serif TC", serif;
    height:100vh;
    overflow:hidden;
}

#game{
    display:flex;
    height:100vh;
}

#main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:40px;
}

#title{
    color:#fff;
    font-size:28px;
    margin-bottom:20px;
}

#text{
    flex:1;
    line-height:2;
    font-size:20px;
    white-space:pre-wrap;
}

#choices{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
    margin-top:20px;
}

.choice{
    background:none;
    border:none;
    color:#aaa;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
    font-family:inherit;
}

.choice:hover{
    color:white;
}

#side{
    width:320px;
    border-left:1px solid #222;
    padding:30px;
}

.panel-title{
    color:white;
    margin-bottom:15px;
    font-size:22px;
}

.side-buttons{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.side-btn{
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
    font-family:inherit;
    font-size:16px;
}

.side-btn:hover{
    color:white;
}

#panelContent{
    line-height:1.8;
    white-space:pre-wrap;
    color:#bbb;
}

#restartBtn{
    margin-top:30px;
    background:none;
    border:none;
    color:#888;
    cursor:pointer;
    font-family:inherit;
    font-size:16px;
}

#restartBtn:hover{
    color:#fff;
}
</style>
</head>
<body>

<div id="game">

    <div id="main">

        <div id="title">放學後的圖書館</div>

        <div id="text"></div>

        <div id="choices"></div>

    </div>

    <div id="side">

        <div class="panel-title">功能</div>

        <div class="side-buttons">
            <button class="side-btn" onclick="showInventory()">
                物品
            </button>

            <button class="side-btn" onclick="showMemo()">
                備忘錄
            </button>
        </div>

        <div id="panelContent">
歡迎來到圖書館。
        </div>

        <button id="restartBtn" onclick="restartGame()">
            重新開始
        </button>

    </div>

</div>

<script>

const textBox = document.getElementById("text");
const choiceBox = document.getElementById("choices");
const panelContent = document.getElementById("panelContent");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.addEventListener("click", () => {

    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }

}, { once:true });

let soundCounter = 0;

function playTypeSound(){

    soundCounter++;

    if(soundCounter % 4 !== 0) return;

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sawtooth";
    oscillator.frequency.value =
        50 + Math.random() * 20;

    gainNode.gain.value = 0.05;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();

    gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + 0.12
    );

    oscillator.stop(audioCtx.currentTime + 0.12);

}
let currentScene = "study";

let inventory = [];

let memos = [];

let explored = {};

const scenes = {

study:{
name:"自修室",

desc:"放學後的圖書館格外安靜。你坐在自修室裡，昏黃的燈光照著空蕩蕩的桌面。",

choices:[
["盆栽",()=>explore("plant")],
["桌面",()=>explore("desk")],
["前往走廊",()=>move("hall")]
]
},

hall:{
name:"走廊",

desc:"長長的走廊連接著圖書館各處，空氣中瀰漫著紙張與灰塵的味道。",

choices:[
["返回自修室",()=>move("study")],
["前往廁所",()=>move("toilet")],
["前往閱覽室",()=>move("reading")],
["前往辦公室",()=>move("office")]
]
},

toilet:{
name:"廁所",

desc:"冷白色燈光映照著空蕩的廁所。",

choices:[
["廁所隔間",()=>explore("stall")],
["工具間",()=>explore("storage")],
["洗手台",()=>explore("sink")],
["返回走廊",()=>move("hall")]
]
},

reading:{
name:"閱覽室",

desc:"成排書架安靜地矗立著。",

choices:[
["書架",()=>explore("bookshelf")],
["沙發",()=>explore("sofa")],
["報章雜誌",()=>explore("magazine")],
["櫃檯",()=>explore("counter")],
["返回走廊",()=>move("hall")]
]
},

office:{
name:"辦公室",

desc:"管理員似乎已經下班。",

choices:[
["辦公桌",()=>explore("officeDesk")],
["飲水機",()=>explore("water")],
["返回走廊",()=>move("hall")]
]
}

};

function typeWriter(text){

    textBox.innerHTML="";

    let i = 0;

    const timer = setInterval(()=>{

        const char = text.charAt(i);

        textBox.innerHTML += char;

        if(
            char !== " " &&
            char !== "\n" &&
            char !== "，" &&
            char !== "。" &&
            char !== "、" &&
            char !== "：" &&
            char !== "；" &&
            char !== "！" &&
            char !== "？"
        ){
            playTypeSound();
        }

        i++;

        if(i >= text.length){
            clearInterval(timer);
        }

    },20);

}
function move(scene){

    currentScene=scene;

    renderScene();

}

function renderScene(){

    const scene=scenes[currentScene];

    typeWriter(scene.desc);

    choiceBox.innerHTML="";

    scene.choices.forEach(c=>{

        const btn=document.createElement("button");

        btn.className="choice";

        btn.innerText=c[0];

        btn.onclick=c[1];

        choiceBox.appendChild(btn);

    });

}

function addMemo(text){

    if(!memos.includes(text))
        memos.push(text);

}

function addItem(item){

    if(!inventory.includes(item))
        inventory.push(item);

}

function explore(id){

switch(id){

case "plant":

if(!explored.plant){

explored.plant=true;

addItem("生鏽鑰匙");

typeWriter("盆栽泥土有被翻動的痕跡，你找到了一把生鏽鑰匙。");

}else{

typeWriter("盆栽已經被你仔細翻找過了。");

}

break;

case "desk":

typeWriter("桌面上殘留著鉛筆痕跡與一張借閱單。");

break;

case "stall":

typeWriter("隔間裡沒有任何人。");

break;

case "storage":

if(!inventory.includes("生鏽鑰匙")){

let hint="工具間似乎上鎖了，需要某種鑰匙。";

addMemo(hint);

typeWriter(hint);

}else{

if(!explored.storage){

explored.storage=true;

addItem("舊文件");

typeWriter("你用鑰匙打開工具間，找到了一份舊文件。");

}else{

typeWriter("工具間空空如也。");

}

}

break;

case "sink":

typeWriter("洗手台反射著蒼白燈光。");

break;

case "bookshelf":

typeWriter("書架上陳列著各種舊書。");

break;

case "sofa":

typeWriter("沙發上有被人坐過的痕跡。");

break;

case "magazine":

typeWriter("幾份過期報紙記錄著數年前的新聞。");

break;

case "counter":

if(!inventory.includes("舊文件")){

let hint="櫃檯抽屜被鎖住了，也許先找到相關線索。";

addMemo(hint);

typeWriter(hint);

}else{

typeWriter("文件中提到一把遺失的鑰匙曾被藏在植物附近。");

}

break;

case "officeDesk":

typeWriter("辦公桌上堆著未整理的文件。");

break;

case "water":

typeWriter("飲水機發出低沉運轉聲。");

break;

}

}

function showInventory(){

let text=`你盤點了身上的物品，總共有「${inventory.length}」項。`;

if(inventory.length){

text+="\n\n分別為：\n";

inventory.forEach(item=>{

text+="• "+item+"\n";

});

}

panelContent.innerText=text;

}

function showMemo(){

if(memos.length===0){

panelContent.innerText="目前沒有備忘錄。";

return;

}

let text="備忘錄：\n\n";

memos.forEach(m=>{

text+="• "+m+"\n\n";

});

panelContent.innerText=text;

}

function restartGame(){

const ok=confirm("確定要重新開始嗎？");

if(!ok) return;

inventory=[];

memos=[];

explored={};

currentScene="study";

panelContent.innerText="歡迎來到圖書館。";

renderScene();

}

renderScene();

</script>

</body>
</html>
